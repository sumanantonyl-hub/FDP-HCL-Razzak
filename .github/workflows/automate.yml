name: Backend app with MongoDB CI CD Deployment in Render 

on:
  push:
    branches: ["main"]

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24' 
      - name: Install dependency
        run: npm install
  deploy:
    runs-on: ubuntu-latest
    needs: build-project
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{secret.RENDER_DEPLOY_HOOK_URL}}